
[Boss_Rush_Config]

	#难度1配置
	[Boss_Rush_Config.difficulty_1]
		#这个定义的是难度1的boss
		boss_01 = ["minecraft:zombie", "minecraft:skeleton", "minecraft:zombie"]
		#这个定义的是boss在难度1血量到达50%召唤的固定小怪，注意要与上面的boss一一对应
		littleboss_01 = ["minecraft:zombie", "minecraft:skeleton", "minecraft:zombie"]
		#这个定义的是打败难度1boss的奖励，注意！！！要与上面的boss数量对应，三个boss就只能是三个物品
		bonus_01 = ["minecraft:golden_apple", "minecraft:golden_apple", "minecraft:golden_apple"]
		#这个定义的是奖励的的数量，要和上面的奖励一一对应
		bonus_number_01 = [1, 1, 1]

