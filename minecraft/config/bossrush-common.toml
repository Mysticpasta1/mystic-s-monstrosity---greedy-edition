	#其他配置
	[Boss_Rush_Config.other]
		#这个定义的是boss血量到达50%召唤的随机小怪，这个写多少都行
		random_littleboss = ["minecraft:zombie", "minecraft:skeleton", "minecraft:zombie"]
		#这个定义的是挑战者传送的位置
		boss_Coordinates = [0, 0, 0]
		#这个定义的是观众传送的位置(注意！！！观众的传送位置不要在场地的范围内)
		audience_Coordinates = [10, 10, 10]
		#这个定义的是场地的x,y,z的半径
		bossrush_size = [15, 15, 15]
		#这个定义的是五个难度的boss血量（在原有血量加算）
		boss_healthy = [100, 300, 1000, 5000, 10000]
		#这个定义的是五个难度的boss攻击力（在原有攻击上加算）
		boss_attack = [0, 10, 20, 50, 100]
		#这个定义的是前四个难度的小怪血量（在原有血量加算）
		little_healthy = [20, 50, 100, 200]
		#这个定义的是五个难度下多人模式boss的血量倍数（人数*该倍率*boss血量+boss基础血量=boss真实血量）
		#第一个是难度1，第二个是难度2，三个是难度3，第四个是难度4（单人模式也受该倍率影响）
		#注意！！！这个配置一定一定要用小数写（如1要写成1.0）
		magnification = [0.8, 0.8, 0.8, 0.8, 0.8]
		#这个定义的是前四个难度的小怪攻击力（在原有攻击上加算）
		little_attack = [0, 5, 10, 20]
		#这个定义的是boss召唤的间隔（以tick计算，20tick=1s）
		tick = [100]

