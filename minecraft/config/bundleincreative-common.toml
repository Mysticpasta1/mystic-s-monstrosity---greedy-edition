#Show the Bundle in a creative tab (set to false to hide).
enableBundle = true
#Creative tab for the Bundle. Example: tools_and_utilities, building_blocks, redstone, combat, ingredients.
creativeTab = "tools_and_utilities"
#Which bundle recipes should be enabled in-game.
#OFF - no crafting recipe
#RABBIT - enable the classic rabbit hide recipe
#LEATHER - enable the new vanilla leather recipe
#BOTH - allow both rabbit hide and leather variants
#Allowed Values: OFF, RABBIT, LEATHER, BOTH
recipeMode = "OFF"

