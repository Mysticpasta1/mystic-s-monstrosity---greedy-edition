#Experience level that will be consumed when transferring modifier from modifier book to equipment
#Range: 1 ~ 100
modifierBookRecipeCost = 22
#Experience level that will be consumed when transferring modifier from equipment to modifier book
#Range: 1 ~ 100
modifierBookCraftCost = 22
#Experience cost exponential multiplier for modifier upgrading
#Range: 0.01 ~ 0.5
modifierMaxLevelRate = 0.1
#Basic experience required for modifier upgrade
#Range: 10 ~ 1000
modifierMaxLevelBase = 125
#Max level which grindstone will prioritize removing modifier over enchantments
#Range: 0 ~ 100
grindstoneRemovalPriorityLevel = 0
#Min level which modifier can be transferred to modifier book on anvil
#Range: 0 ~ 100
modifierToBookLevel = 30
#Enable forging for type Weapon
enableWeaponForging = true
#Enable forging for type Ranged Weapon
enableRangedForging = true
#Enable forging for type Armor
enableArmorForging = true
#Enable forging for type Tool
enableToolForging = true
#Enable forging for type Curio
enableCurioForging = true
#Enable modifier to be upgraded
enableModifierUpgrades = true
#Modifier book reinforcement material
bookReinforcementMate = "minecraft:nether_star"

[reinforce]
	#Echo Shard Reinforce: pick  exp bonus
	#Range: 0.01 ~ 100.0
	echoShardPickExpBonus = 0.03
	#Earth Core Reinforce: mining speed bonus
	#Range: 0.01 ~ 100.0
	earthCoreMiningSpeed = 0.08
	#Void Essence Reinforce: extra abyss damage
	#Range: 1.0 ~ 100000.0
	voidEssenceExtraDamage = 2.0
	#Death Essence Reinforce: The amount of health regenerated after attacking
	#Range: 0.01 ~ 100.0
	deathEssenceDamageHeal = 0.05
	#Pure Star Reinforce: percentage damage attached when attacking undead creatures
	#Range: 0.01 ~ 1.0
	pureStarDamageFactor = 0.01

