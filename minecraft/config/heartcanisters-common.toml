
[common]
	#Common Config
	#Enables or disables canister use limits.
	limitUses = false
	#Only works if limitUses is true. Sets the max uses for canisters.
	#Range: 1 ~ 10000
	canisterMaxUses = 50
	#Sets the health value increment of canisters.
	#Range: 1.0 ~ 1000.0
	canisterIncreaseValue = 2.0
	#Sets the heal value of normal hearts.
	#Range: 1.0 ~ 1000.0
	heartHealValue = 1.0
	#Absorption duration (20 ticks = 1 second)
	#Range: 1 ~ 10000
	goldenHeartTicksDuration = 2400
	#Drops normal hearts only when not at full hp. Change it at your own risk.
	#This could ruin the purpose and make it a lot easier to have hearts in the inventory.
	dropNormalOnlyMissingHP = true
	#Drops golden hearts only when at full hp.
	dropGoldenOnlyFullyHP = true
	#Sets the drop chance of normal hearts in percentage.
	#Range: 1 ~ 100
	normalDropChance = 25
	#Sets the drop chance of golden hearts in percentage.
	#Range: 1 ~ 100
	goldenDropChance = 5

