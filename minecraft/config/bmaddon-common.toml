
[blood_generator]
	#Maximum Forge Energy stored by the Blood Generator.
	#Range: > 1
	energyCapacity = 100000
	#Maximum Forge Energy accepted per insertion.
	#Range: > 1
	maxEnergyInput = 2000
	#Maximum Life Essence stored by the Blood Generator, in mB.
	#Range: > 1
	lifeTankCapacity = 16000
	#Forge Energy consumed per generation operation.
	#Range: > 1
	energyPerOperation = 1000
	#Life Essence generated per operation, in mB.
	#Range: > 1
	lifeEssencePerOperation = 10
	#How often the generator runs. 1 = every tick, 20 = once per second.
	#Range: 1 ~ 1200
	workIntervalTicks = 1
	#If true, the Blood Generator will push Life Essence into adjacent fluid handlers.
	autoOutput = true
	#Maximum Life Essence pushed to adjacent fluid handlers per tick, in mB.
	#Range: > 1
	maxFluidOutputPerTick = 100

[blood_altar_assembler]
	#Base craft time for Blood Altar Assembler, in ticks.
	#Range: 1 ~ 72000
	baseCraftTimeTicks = 200
	#Minimum craft time after acceleration cards, in ticks.
	#Range: 1 ~ 72000
	minCraftTimeTicks = 20
	#Base AE energy consumed per active craft each tick.
	#Range: 0.0 ~ 1.7976931348623157E308
	aePerTickBase = 8.0
	#Additional AE energy consumed per active craft each tick per acceleration card.
	#Range: 0.0 ~ 1.7976931348623157E308
	aePerTickPerAccelerationCard = 12.0
	#Multiplier for Life Essence required by Blood Altar recipes.
	#Range: 0.0 ~ 1.7976931348623157E308
	lifeEssenceMultiplier = 1.0
	#How many crafts the Blood Altar Assembler can run without parallel cards.
	#Range: 1 ~ 64
	baseParallelCrafts = 1
	#How many additional parallel crafts each Blood Altar Parallel Card adds.
	#Range: 0 ~ 64
	parallelCraftsPerCard = 1
	#Hard cap for active crafts in one Blood Altar Assembler.
	#Range: 1 ~ 64
	maxParallelCrafts = 4

