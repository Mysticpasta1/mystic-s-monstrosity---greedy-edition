
[Structures]
	#Spawn chance for the Cursed Altar structure
	#Range: 0.0 ~ 1.0
	cursedAltarSpawnChance = 1.0
	#Biomes where the Cursed Altar should NOT spawn.
	#Use biome IDs (e.g. "minecraft:ocean") or tags with a leading # (e.g. "#minecraft:is_river")
	#Examples: ["minecraft:ocean", "minecraft:river", "#minecraft:is_beach"]
	cursedAltarBiomeBlacklist = []

["Curse Modifiers"]
	#Minimum number of seconds that a Survival Trial can curse the player for
	#If value is set to 0, all Survival Trials will result in an instant completion
	#Range: 0 ~ 12000
	curseTimeMinimum = 180
	#Maximum number of seconds that a Survival Trial can curse the player for
	#If value is set to 0, all Survival Trials will result in an instant completion
	#Range: 0 ~ 18000
	curseTimeMaximum = 240
	#List of valid items (by ID) that can be required in the Fetch Trial.
	#Example: ["minecraft:iron_ingot", "minecraft:string"]
	fetchTrialItems = ["minecraft:iron_ingot", "minecraft:gold_ingot", "minecraft:copper_ingot", "minecraft:raw_iron", "minecraft:raw_gold", "minecraft:raw_copper", "minecraft:lapis_lazuli", "minecraft:redstone", "minecraft:rotten_flesh", "minecraft:bone", "minecraft:ender_pearl", "minecraft:gunpowder", "minecraft:spider_eye", "minecraft:glowstone_dust", "minecraft:sugar", "minecraft:string"]

["Rite Modifiers"]
	#Base chance for player to be cursed with a Tier 1 trial
	#All values for trials chances should ideally add up to 10 to avoid bugs
	#Range: 0.0 ~ 10.0
	cursedTrialTier1Chance = 6.0
	#Base chance for player to be cursed with a Tier 2 trial
	#All values for trials chances should ideally add up to 10 to avoid bugs
	#Range: 0.0 ~ 10.0
	cursedTrialTier2Chance = 3.0
	#Base chance for player to be cursed with a Tier 3 trial
	#All values for trials chances should ideally add up to 10 to avoid bugs
	#Range: 0.0 ~ 10.0
	cursedTrialTier3Chance = 1.0
	#Amount of trials for player to complete before Tier 2 trials become available
	#Range: 1 ~ 256
	cursedTrialTier2Threshold = 5
	#Amount of trials for player to complete before Tier 3 trials become available
	#Range: 1 ~ 256
	cursedTrialTier3Threshold = 15
	#Max amount of trials for player to complete before Tier 3 trials are guaranteed
	#Range: 1 ~ 256
	cursedTrialMaxChance = 25

