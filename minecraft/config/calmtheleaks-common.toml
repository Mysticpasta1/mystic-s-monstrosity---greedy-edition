#Chunk count below which leaks are considered baseline retention (default: 48)
#Range: > 0
baseline_chunk_threshold = 48
#Time in seconds after server start during which leak warnings are suppressed (default: 600 = 10 minutes)
#Range: > 0
startup_grace_period_seconds = 600
#Time window in minutes for tracking chunk count trends (default: 15)
#Range: 1 ~ 60
trend_window_minutes = 15
#Chunk count above which leaks are escalated as confirmed (default: 96)
#Range: > 0
escalation_chunk_threshold = 96
#Whether to log detailed debug information (default: false)
log_debug_details = false
#Whether to automatically trigger Spark profiling when leaks are detected (default: true). Set to false to disable automatic Spark profiling and avoid chat messages.
auto_spark_profiling = true

